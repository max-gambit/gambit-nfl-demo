cultural_signals:
  stability:
    value: medium
    detail: Front office stable under Lacob/Dunleavy (post-Myers); coaching future uncertain (Kerr exploring options post-season). 15 years of ownership continuity but recurring playoff disappointments 2021-2025 have created org-wide evaluation pressures.
  player_friendly:
    value: yes
    detail: Warriors have historically maintained positive player relationships. Butler extension negotiated smoothly post-trade. Curry retention prioritized. However, recent roster churn (Wiggins departure, Kuminga RFA stalemate) signals pragmatic rather than romantic approach.
  analytics_orientation:
    value: heavy
    detail: Google Cloud partnership enables real-time data pipelines. Dunleavy has transitioned org from analytics-validation model to analytics-first decision framework. Trade analysis relies on simulation modeling. However, human judgment remains central (e.g., Butler trade driven by championship window assessment).
  risk_tolerance:
    value: aggressive
    detail: Owner Lacob explicitly dismisses apron penalties in service of contention. Midseason trades, luxury tax spending, willingness to restructure core. New CBA constraints have moderated spending relative to 2014-2019 dynasty, but still among league's most aggressive.
  notable_traits:
    - kerr_tree
    - process_driven
    - star_chasing
    - homegrown_priority
  rationale: Warriors culture reflects owner's championship-or-bust philosophy balanced with analytics-informed front office under Dunleavy. Coaching tree influence (Jackson/Popovich via Kerr) emphasizes democratic offense and player autonomy, though recent seasons show pragmatic acquisition focus. Org maintains homegrown DNA (Curry, Green) while aggressively targeting star free agents (Butler, Horford).
  confidence: high
