strategic_posture:
  timeframe: contend_now
  confidence: high
  derived_from:
    - Roster construction around aging core (Curry 37, Butler 36, Green 35) signals present-tense window
    - Aggressive trade (Jimmy Butler for Andrew Wiggins + picks + salary) and free agent signings (Al Horford, De'Anthony Melton, Seth Curry) indicate all-in mentality
    - "2024-25 season: 7th seed, beat 2nd-seed Rockets in Game 7, validated playoff potential despite regular season struggles"
    - Championship expectations set by FO and ownership despite age concerns
  constraints:
    - reason_code: max_contract_lockup
      detail: Curry ($59.6M), Butler ($55.5M/yr on $121M extension), Green ($25.9M) locked into significant contracts through 2026-27
      weight: high
    - reason_code: tax_apron_constraints
      detail: Team is $3.5M below second apron after TMLE signing (Al Horford); hard-capped at $207.8M, limiting roster flexibility
      weight: high
    - reason_code: aging_core
      detail: Three core players (Curry, Butler, Green) age 35+; injury risk and decline trajectory create urgency
      weight: high
    - reason_code: ownership_directive
      detail: Joe Lacob has signaled commitment to present-window spending regardless of apron penalties
      weight: medium
  trigger_events:
    - Significant injury to Curry, Butler, or Green would force roster restructuring
    - Coach Kerr's decision (expected May 2026) will inform 2026-27 continuity
    - First-round playoff exit would prompt strategic reset discussion
  last_reviewed: 2026-05-02
