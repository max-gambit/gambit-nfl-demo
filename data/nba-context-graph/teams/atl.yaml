  derived_from:
    - Made playoffs for first time since 2023; avoided play-in in 2025-26 with 6th seed despite mid-season Trae Young trade.
    - Core backcourt (Dyson Daniels, CJ McCollum) and frontcourt (Jalen Johnson, Onyeka Okongwu, Kristaps Porzingis) positioning for sustained contention.
    - Young core developing (Zaccharie Risacher, Asa Newell) while maintaining veteran presence; 2025-26 offseason additions focused on complementary pieces.
