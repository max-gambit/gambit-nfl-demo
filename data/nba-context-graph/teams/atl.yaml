narrative_summary:
  one_paragraph: "The Atlanta Hawks completed their first non-play-in season since 2020-21, finishing 6th in the Eastern Conference and advancing through the first round before losing decisively to the Knicks. Under new GM Onsi Saleh (hired April 2025), the franchise executed a bold mid-season trade of franchise cornerstone Trae Young to Washington for aging veteran C.J. McCollum, catalyzing a 27-15 second-half surge. The core Young-Daniels-Johnson-Okongwu backcourt was reshaped by acquisition of Kristaps Porzingis (expiring) and Alexander-Walker (4yr/$62M) in summer 2025, emphasizing defensive intensity and spacing over isolation offense. Quin Snyder's defense-first coaching mandate and Saleh's draft-and-develop philosophy (evidenced by Zaccharie Risacher #1OA 2024, Asa Newell #23 2025) signal a multi-year contention window built on youth development rather than quick fixes. Key decision points loom: Porzingis UFA status (extension vs. test market), McCollum's re-signing likelihood, and Jalen Johnson's health trajectory after shoulder/hip injuries."
  three_things_to_watch:
    - "2026 draft board: official assets No. 8 from NOP, No. 23 from CLE, No. 57 from BOS; The Athletic mock-source layer lists No. 8: Mikel Brown Jr.; No. 23: Chris Cenac Jr. as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - "Kristaps Porzingis free agency decision: Expiring contract and UFA status give Hawks limited leverage; extension could cost $30-35M+/yr or he could test market. Durability concerns (age 30, injury history) may limit competing offers."
    - "Jalen Johnson injury recovery: Shoulder and hip issues plagued 2025-26; full return to career-high production levels essential for contention window. Young core (Daniels, Risacher, Newell, Okongwu) depends on his star-caliber wing/PF impact."
