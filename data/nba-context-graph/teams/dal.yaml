narrative_summary:
  one_paragraph: "The 2025-26 Dallas Mavericks were a franchise in explicit rebuild mode following the February 2025 trade of superstar Luka Doncic to the Los Angeles Lakers for Anthony Davis — a decision widely vilified across sports media and fan bases. General manager Nico Harrison was fired in November 2025 after the team's 3-8 start. Interim GMs Michael Finley and Matt Riccardi, managing a 26-56 season, executed a pragmatic February 2026 trade of Anthony Davis to Washington, shedding salary to maximize cap flexibility (now $38.6M+ under tax). The franchise acquired the #1 pick in 2025 and selected Cooper Flagg, a 'generational talent' who won 2026 Rookie of the Year (21 PPG, 6.7 RPG, 4.5 APG). Kyrie Irving remains under contract through 2027 but missed 2025-26 with an ACL tear; his 2026-27 return will define the rebuild's trajectory. Coach Jason Kidd, signed to a multi-year extension in October 2025, provides institutional stability. Owner Miriam Adelson's Adelson-Dumont ownership group (69% stake acquired December 2023) faces credibility crisis post-Luka, with permanent basketball operations hire expected by June 2026."
  three_things_to_watch:
    - "2026 draft board: official assets No. 9, No. 30 from OKC, No. 48 from PHX; The Athletic mock-source layer lists No. 9: Brayden Burries; No. 30: Tounde Yessoufou as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - Permanent POBO/GM hire (Tim Connelly, Dennis Lindsey, or internal candidates Finley/Riccardi) and that person's vision for Kyrie Irving's role in rebuild.
    - Kyrie Irving's health/performance upon 2026-27 return; determines whether he's core to Flagg timeline or future trade chip.
