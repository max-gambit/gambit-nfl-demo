cultural_signals:
  stability:
    value: medium
    detail: Jason Kidd contract extension (Oct 2025) signals coach stability, but GM vacancy (since Nov 2025) and post-Luka organizational chaos (Cuban public regret, ownership angst) create mid-level uncertainty. Interim FO doing competent job (Davis trade asset recovery was pragmatic).
  player_friendly:
    value: mixed
    detail: Kyrie Irving extended; Gafford secured long-term deal. However, franchise superstar Luka traded without requesting it (Jan-Feb 2025); subsequent trading of Davis may signal willingness to move star assets for rebuilds. Mixed signals post-Adelson acquisition.
  analytics_orientation:
    value: balanced
    detail: Kidd's coaching approach balances defensive scheme and player development; Finley/Riccardi interim leadership emphasizes cap flexibility and asset optimization (Davis trade). No public statement on front-office analytics structure since Harrison firing.
  risk_tolerance:
    value: aggressive
    detail: Unilateral Doncic trade (no player request) and immediate Anthony Davis shedding (1 year after acquisition) indicate ownership willingness to make disruptive moves, even if strategically questionable in near term.
  notable_traits:
    - star_chasing
    - process_driven
  rationale: Adelson-Dumont ownership era marked by major disruptive trades (Luka, Davis) that prioritized cap/flexibility over star retention. Kidd stability and interim FO asset management suggest process-level competence, but cultural uncertainty remains post-Luka fallout. Interim leadership managing rebuild pragmatically.
  confidence: medium
