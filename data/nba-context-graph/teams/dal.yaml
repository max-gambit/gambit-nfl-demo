identity:
  name: Dallas Mavericks
  conference: Western
  division: Southwest
  market_tier: tier_2
  market_tier_rationale: Large metro market (DFW) with strong recent brand equity from Luka era, second-tier market relative to NYC/LA but ahead of most regional markets.
ownership:
  primary_owner:
    name: Miriam Adelson
    type: individual
    tenure_years: 2.3
    source: https://www.nbcdfw.com/news/sports/miriam-adelson-dallas-mavericks-mark-cuban/3561775/
    confidence: high
  governance_notes: Adelson acquired 69% controlling stake in December 2023; son-in-law Patrick Dumont serves as CEO and Chairman with final decision authority. Mark Cuban retained 27% minority stake with buyout option to Adelson family within 4 years. Dumont was final decision-maker on Luka Doncic trade (Feb 2025) and termination of GM Nico Harrison (Nov 2025).
  recent_transitions: Adelson-Dumont acquisition of control from Mark Cuban closed Dec 27, 2023 at $3.5–3.8B valuation. Cuban has publicly stated regret over the sale, particularly regarding Dumont's basketball decisions (Luka trade fallout).
  spending_posture: aggressive_spender
  spending_posture_evidence:
    - 2025-26 payroll ~$187M–206M, above luxury tax threshold heading into season before Anthony Davis trade relieved pressure.
    - Extended Kyrie Irving to 3-year deal; extended Daniel Gafford through 2029; signed Klay Thompson in 2024.
    - Aggressive mid-season pivot via Anthony Davis trade (Feb 2026) signals willingness to absorb cap consequences for roster flexibility.
front_office:
  president_basketball_ops:
    name: vacant
    tenure_start: unknown
    prior_stops: []
    public_philosophy_signals: []
    confidence: high
    source: https://thesmokingcuban.com/mavericks-scramble-to-replace-nico-harrison-finally-has-set-timeline
  general_manager:
    name: Michael Finley (interim, co-) / Matt Riccardi (interim, co-)
    tenure_start: 2025-11
    prior_stops:
      - "Finley: Former Mavericks player, assistant roles in front office"
      - "Riccardi: Previously assistant GM, scouting leadership"
    public_philosophy_signals:
      - Both managing team in rebuild mode; emphasis on development of Cooper Flagg and young talent.
      - Executed Anthony Davis trade (Feb 2026) to prioritize cap flexibility and roster reconfiguration around draft assets.
      - Preserved coaching stability (extended Jason Kidd in Oct 2025).
    confidence: high
    source: https://www.nba.com/news/mavs-nico-harrison-out-as-gm
  head_coach:
    name: Jason Kidd
    tenure_start: 2021-10
    contract_through: unknown
    style_notes: Emphasizes defensive identity, ball movement, and collective responsibility. Evolved toward player-centric, developmental approach after initial tenure. 179–149 record (.546) in four seasons; led Mavericks to 2024 Finals with Doncic-Irving core. Multi-year extension signed Oct 2025 signals ownership commitment to stability through rebuild.
    coaching_tree: unknown
    confidence: high
    source: https://www.nba.com/news/jason-kidd-extension-mavericks
  assistant_coaches_notable:
    - Frank Vogel (lead assistant, former Lakers HC)
    - Jay Triano (former Raptors/Suns HC, 2020 Lakers championship)
    - Popeye Jones
    - Phil Handy (2020 Lakers championship)
    - Mike Penberthy (2020 Lakers championship)
  notable_advisors_or_consultants:
    - "name: unknown"
strategic_posture:
  timeframe: rebuild
  confidence: high
  derived_from:
    - 26–56 record in 2025-26; traded franchise superstar Luka Doncic (Feb 2025); fired GM Nico Harrison (Nov 2025); traded Anthony Davis (Feb 2026) for expiring contracts and picks.
    - Ownership/interim FO publicly acknowledged season was 'really difficult' but emphasized Cooper Flagg as 'generational talent' and North Star for rebuild.
    - Development of young players prioritized over wins; 'meaningful basketball centered solely on Cooper Flagg.'
  constraints:
    - reason_code: aging_core
      detail: Kyrie Irving (out 2025-26 with ACL tear, expected return 2026-27) and Klay Thompson (age 34 entering 2025-26) do not align with 19-year-old Flagg timeline.
      weight: high
    - reason_code: max_contract_lockup
      detail: Irving signed 3-year extension (age 34+); Daniel Gafford extension through 2029; salary commitments complicate youth acceleration.
      weight: medium
    - reason_code: new_front_office
      detail: Interim GMs (Finley, Riccardi) leading permanent search; permanent POBO hiring critical before draft/free agency.
      weight: high
    - reason_code: ownership_directive
      detail: Adelson-Dumont ownership, having approved Luka trade (now viewed as franchise disaster), faces pressure to restore credibility via rebuild credibility.
      weight: medium
  trigger_events:
    - Permanent POBO hire (expected by late June 2026 per Patrick Dumont).
    - Kyrie Irving's 2026-27 return and health status; decision to retain or trade.
    - 2026 draft lottery result: DAL holds No. 9 and also owns No. 30 from OKC via WAS and PHI.
    - Emergence of Cooper Flagg in year 2; confirmation that generational talent thesis holds.
  last_reviewed: 2026-05-02
