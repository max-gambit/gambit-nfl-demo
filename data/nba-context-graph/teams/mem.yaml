strategic_posture:
  timeframe: rebuild
  confidence: high
  derived_from:
    - 25-57 regular season record in 2025-26, missed playoffs entirely
    - Two core players traded mid-season/pre-offseason (Desmond Bane to Orlando, Jaren Jackson Jr. to Utah)
    - Ja Morant expected to be traded this offseason per NBA reporting
    - Emphasis on acquiring future draft picks (4 from Bane trade, 3 from JJJ trade)
    - FO publicly stated focus on young roster with many first-round assets as future centerpiece
  constraints:
    - reason_code: max_contract_lockup
      detail: Ja Morant locked in through 2027-28 with $42M+ remaining; significant negative asset if trade market diminished
      weight: high
    - reason_code: recent_playoff_success
      detail: 2024-25 made play-in (48-34); cliff-like decline signals organizational dysfunction affecting morale and roster cohesion
      weight: high
    - reason_code: coaching_decision_pending
      detail: Tuomas Iisalo's system generated friction with Ja Morant (team suspension); cultural fit uncertain
      weight: medium
    - reason_code: tax_apron_constraints
      detail: Remain $30M below luxury tax but rebuilds typically avoid tax payroll commitments
      weight: medium
  trigger_events:
    - Ja Morant successfully traded with positive return (moves to contender)
    - Young cohort (Cedric Coward, Jaylen Wells, Scotty Pippen Jr.) shows 2027+ viability in extended mins
    - Draft capital deployed effectively in 2026-27 draft (own picks + Utah/Orlando assets)
    - Coaching chemistry with remaining core improves; Iisalo retention justified
  last_reviewed: 2026-05-02
