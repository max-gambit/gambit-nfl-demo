narrative_summary:
  one_paragraph: "The Memphis Grizzlies entered 2025-26 as defending play-in participants following a surprise 48-34 season and first-round exit to Oklahoma City. However, dysfunction rapidly unfolded: Taylor Jenkins was fired nine games into the season despite prior success, replaced mid-stream by Finnish coach Tuomas Iisalo. The team collapsed to 25-57, the worst record since 2017-18, missing the playoffs entirely. GM Zach Kleiman executed a full reset, trading All-Star Jaren Jackson Jr. to Utah and previously dealing Desmond Bane to Orlando, acquiring draft capital instead. Ja Morant—homegrown superstar and organizational cornerstone—became trade bait amid public friction with the new coaching system and coaching-generated team suspensions. With Iisalo's system emphasizing pace, spacing, and discipline, the rebuild now prioritizes developing a young cohort (Cedric Coward, Santi Aldama, GG Jackson, Jaylen Wells, Zach Edey, Scotty Pippen Jr.) with 2027-28 contention target and accumulated first-round picks to reshape the roster."
  three_things_to_watch:
    - "2026 draft board: official assets No. 3, No. 16 from PHX, No. 32 from IND; The Athletic mock-source layer lists No. 3: Cameron Boozer; No. 16: Koa Peat as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - "Ja Morant trade market closure: which contender acquires him, at what price, and whether diminished bidding confirms organizational dysfunction"
    - "Tuomas Iisalo's coaching continuity and system adoption: whether young core embraces demanding pace-and-space style or exhibits continued friction"
