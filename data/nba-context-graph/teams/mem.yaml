cultural_signals:
  stability:
    value: low
    detail: Mid-season coach firing (Taylor Jenkins), rapid core player departures, player-coach friction (Ja Morant suspension), and full rebuild signal dysfunction
  player_friendly:
    value: mixed
    detail: Robert Pera publicly committed to Memphis (no relocation interest); front office granted contract extensions but demanding new coach may have deterred veteran interest
  analytics_orientation:
    value: balanced
    detail: Emphasis on measurable athleticism (size, speed) and draft asset accumulation suggests data-informed decisions, but traditional scouting culture present
  risk_tolerance:
    value: aggressive
    detail: Mid-season coaching change, rapid dismantling of core, hiring unproven European coach, wholesale roster turnover
  notable_traits:
    - coach_carousel
    - new_front_office
    - tanking_for_pick
    - developmental_org
  rationale: "The 2025-26 season revealed a franchise in crisis: after surprising 2024-25 playoff run, catastrophic 25-57 collapse forced coaching decision mid-season and rapid trade of two All-Star-level players. New coach Iisalo and GM Kleiman entering rebuild with emphasis on young talent development and draft capital. Organization now focused on building through 2027-28, not contending short-term."
  confidence: high
