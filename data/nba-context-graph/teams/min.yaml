strategic_posture:
  timeframe: contend_now
  confidence: high
  derived_from:
    - Championship-window core (Edwards, Randle, Gobert, Reid) locked in with multi-year extensions through 2027-28
    - 2025 WCF appearance (lost to OKC in 5) demonstrates playoff readiness
    - Connelly explicitly stated aggressive in-season moves necessary to capitalize on current roster
    - Second-apron constraints now limiting trade flexibility; standing pat at Feb 2026 deadline despite seeking Giannis
    - Ownership willing to sustain $80M+ annual luxury tax bills to maintain contention
  constraints:
    - reason_code: second_apron_constraints
      detail: Wolves are near second apron (within $3-7M), limiting salary-matching flexibility in trades; hard-cap acceptance restricts mid-season acquisitions.
      weight: high
    - reason_code: max_contract_lockup
      detail: Edwards, Randle, Gobert, Reid, McDaniels represent ~77% of cap over next 3-4 years; no flexibility for new max signings.
      weight: high
    - reason_code: ownership_directive
      detail: New ownership (Lore/Rodriguez) committed to aggressive spending; internal mandate to compete annually in championship window.
      weight: high
  trigger_events:
    - First-round playoff exit or major injury to Edwards/Gobert would signal need for mid-season pivot
    - OKC Thunder's ascent and sustained West dominance could force re-evaluation of timeline
    - Failed extension negotiations with Randle or DiVincenzo would trigger fire-sale consideration
