      - Emphasis on youth development and long-term core building (Banchero, Wagner, Suggs drafted and extended)
      - Strategic trade discipline; willing to move pieces (Cole Anthony, KCP) for positional upgrades (Bane)
      - Patient cap management to preserve flexibility below hard-cap thresholds
