ownership:
  primary_owner:
    name: Stan Kroenke (family holding via Josh Kroenke)
    type: corporate
    tenure_years: 17
    source: https://en.wikipedia.org/wiki/Josh_Kroenke
    confidence: high
  governance_notes: Josh Kroenke serves as Vice Chairman of KSE and Nuggets team president. Stan Kroenke holds ownership stake; Josh Kroenke assumed executive role post-Malone/Booth firings (April 2025). Interim presidential duties post-April 2025.
  recent_transitions: April 8, 2025 - fired head coach Michael Malone and GM Calvin Booth with 3 games left in regular season; June 23, 2025 - promoted Ben Tenzer to EVP Basketball Operations, hired Jonathan Wallace as EVP Player Personnel (dual leadership structure replacing single GM role).
  spending_posture: aggressive_spender
  spending_posture_evidence:
    - Consistently paid luxury tax since 2023 championship win; payroll hovering $192-207M, second apron bound.
    - Signed Jokic 5yr/$276M supermax (2022); Murray 4yr/$208M max extension (2023); Aaron Gordon 4yr/$133M extension (Oct 2024).
    - Pursued FA signings of Bruce Brown, Tim Hardaway Jr., Jonas Valanciunas to compete immediately post-MPJ trade.
    - "Yet strategic constraints evident: traded MPJ to save $17M annually; second apron restrictions limit roster construction; no first-round picks available through 2031 due to Stepien rule violations."
