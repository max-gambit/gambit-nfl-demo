narrative_summary:
  one_paragraph: "The Boston Celtics are the defending NBA champions executing a mid-season financial pivot to remain contenders while escaping second apron penalties. With Jayson Tatum returning from a 2025 Achilles rupture (62 games missed), the Celtics finished the 2025-26 regular season 51-25 and claimed the 2nd Eastern Conference seed. Brad Stevens (President, newly honored as Executive of the Year) orchestrated trades shipping Jrue Holiday and Kristaps Porzingis in summer 2025, then pivoted mid-season to acquire Nikola Vučević from Chicago in exchange for Anfernee Simons. The franchise now faces Game 7 against the Philadelphia 76ers on May 2, 2026, with Tatum questionable due to left knee stiffness. As of May 2, the team sits below the first apron and is strategically ducking the luxury tax in 2026-27 to reset its repeater tax clock; this unlocks aggressive spending from 2027-28 onward when Tatum is two years post-injury. Ownership transition (Bill Chisholm's acquisition of majority control in September 2025) has not disrupted continuity: Chisholm retained Stevens, coach Joe Mazzulla (renewed mid-season), and former owner Grousbeck as co-operator."
  three_things_to_watch:
    - "2026 draft board: official assets No. 27, No. 40 from MIL; The Athletic mock-source layer lists No. 27: Isaiah Evans as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - Tatum's Achilles recovery trajectory and return-to-form (16 games played at 21.8 PPG, 10.0 RPG averages before playoffs); any re-injury derails 2026-27 window.
    - "Cap reset execution: must remain below luxury tax in 2026-27 to fully unlock 2027-28 spending power; repeater penalties otherwise persist."
    - "Ownership stability post-Chisholm: willingness to fund roster moves and playoff payroll will clarify expectations. Early signals (retaining Stevens, Mazzulla, Grousbeck co-role) suggest continuity."
