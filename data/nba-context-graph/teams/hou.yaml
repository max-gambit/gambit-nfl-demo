cultural_signals:
  stability:
    value: high
    detail: Ime Udoka in place since April 2023 with extension through 2027; Rafael Stone stable GM since Oct 2020; ownership committed despite ambassadorial role. Consistent organizational direction post-Morey era.
  player_friendly:
    value: yes
    detail: Multi-year extensions offered to young core (Sengun, Smith Jr., Thompson); accommodated Thompson's development timeline; signed experienced mentors (Adams, Finney-Smith, VanVleet) to support young players. Ownership allows aggressive spending.
  analytics_orientation:
    value: balanced
    detail: "Stone era emphasizes balanced approach: analytics-informed trades (Oladipo for Adams fit analysis) but also star-chasing pragmatism (Durant trade). Defensive philosophy relies on film/principles but supported by efficiency metrics."
  risk_tolerance:
    value: aggressive
    detail: Blockbuster Durant trade without proven fit; aggressive extensions for unproven extensions (Thompson, Smith Jr.); willingness to sacrifice future assets for present contention.
  notable_traits:
    - star_chasing
    - homegrown_priority
    - process_driven
    - popovich_tree
  rationale: Rockets transitioned under Stone from lottery-stage development to star-acquisition mode. Udoka's Popovich lineage drives defensive identity and player development emphasis. Ownership support enables aggressive spending to supplement young core with veteran talent. Organization is process-driven in trades and contract management but willing to take large swings.
