narrative_summary:
  one_paragraph: The San Antonio Spurs have emerged as a contender-in-waiting following a transformative 2024-25 season. After Gregg Popovich's historic 29-year tenure ended due to a November stroke, assistant Mitch Johnson ascended to head coach and led San Antonio to the playoffs for the first time since 2019, defeating Portland 4-1 in the first round. The core is anchored by star point guard De'Aaron Fox (acquired Feb 2025, extended through 2029-30), generational center Victor Wembanyama (year 2, rookie-max extension eligible July 2026), and young backcourt mate Stephon Castle (Kia ROTY 2025). Supporting depth includes Devin Vassell ($146M extension), Keldon Johnson, and promising rookies Dylan Harper (#2, 2025) and Carter Bryant (#14, 2025). With 36 draft picks over seven years and payroll above the first apron, the Spurs balance near-term contention with long-term flexibility under GM Brian Wright's best-player-available philosophy. Johnson's defensive intensity and process-driven culture—rooted in Popovich's legacy—positions San Antonio to compete for years.
  three_things_to_watch:
    - "2026 draft board: official assets No. 20 from ATL, No. 35 from UTA, No. 42 from POR, No. 44 from MIA; The Athletic mock-source layer lists No. 20: Karim Lopez as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - Victor Wembanyama's rookie max extension negotiation (eligible July 2026); extension shape and terms will signal franchise's long-term commitment and Wembanyama's satisfaction with organizational direction.
    - Dylan Harper's integration as Fox's backcourt partner; chemistry and developmental pace critical to validating front office's forward-thinking approach and 2025 draft selections.
    - Mitch Johnson's second-year coaching trajectory; system continuity, player development, and playoff sustainability (vs. first-round exit) will determine if transition from Popovich era sustainable or requires reset.
