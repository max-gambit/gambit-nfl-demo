cultural_signals:
  stability:
    value: high
    detail: Organization survived Gregg Popovich stroke (Nov 2024) and coaching transition; Mitch Johnson installed smoothly. No reported locker room dysfunction. Ownership stable under Holt.
  player_friendly:
    value: yes
    detail: Extended De'Aaron Fox to 4-year, $229M deal in first offseason post-trade; investment in young players; Popovich legacy of player development and respect.
  analytics_orientation:
    value: balanced
    detail: Brian Wright emphasizes skills/fit over rigid positions, suggesting analytics influence. Traditional Popovich foundation still present in Johnson's approach.
  risk_tolerance:
    value: aggressive
    detail: Traded for Fox, invested in lottery picks (Harper, Bryant), pursued Wembanyama ecosystem around unproven talent.
  notable_traits:
    - popovich_tree
    - developmental_org
    - homegrown_priority
    - process_driven
  rationale: Spurs organization built on Popovich's 29-year foundation of consistency, player development, and scouting sophistication. Transition to Mitch Johnson maintains cultural continuity while shifting to a more aggressive, defensive-first style. International/global scouting core remains. Ownership transition (Holt-Sixth Street) signals continued stability and investment.
  confidence: high
