identity:
  name: San Antonio Spurs
  conference: Western
  division: Southwest
  market_tier: tier_2
  market_tier_rationale: Major metropolitan market with deep NBA legacy and strong regional fan base; media market rank ~35 in US, but franchise equity and historical significance elevate tier.
ownership:
  primary_owner:
    name: Peter J. Holt
    type: individual
    tenure_years: 6
    source: https://www.si.com/nba/spurs/onsi/news/spurs-investors-michael-dell/
    confidence: high
  governance_notes: Holt family remains largest shareholder (~40% stake). Sixth Street Partners and Michael Dell joined as strategic co-investors in June 2021; structure reduced shareholder count from 22 to 13. Other minority investors include Joe Gebbia (Airbnb), Paul Viera (Earnest Partners CEO).
  recent_transitions: none
  spending_posture: aggressive_spender
  spending_posture_evidence:
    - De'Aaron Fox acquired via trade (Feb 2025) and signed 4-year, $229M extension (Aug 2025)
    - First round picks Dylan Harper (#2) and Carter Bryant (#14) in 2025 draft, both lottery talent
    - Luke Kornet, Kelly Olynyk, Lindy Waters III added in free agency/trades
    - Payroll estimated $187M in 2025-26, above salary cap floor despite rebuild trajectory
front_office:
  president_basketball_ops:
    name: Gregg Popovich
    tenure_start: 2025-05
    prior_stops:
      - Head Coach, San Antonio Spurs (1996-2025, 29 seasons)
    public_philosophy_signals:
      - Emphasized continuity and organizational stability in transition statement
      - Focused on youth development and homegrown talent during coaching tenure
    confidence: high
    source: https://www.nba.com/news/gregg-popovich-becomes-spurs-team-president
  general_manager:
    name: Brian Wright
    tenure_start: 2019-08
    prior_stops:
      - Assistant GM, Denver Nuggets
      - Scout, Cleveland Cavaliers
    public_philosophy_signals:
      - Best-player-available draft philosophy; does not force positional need fills
      - Emphasis on 'versatility' and skills fit over traditional positions/size
      - Global scouting approach; evaluates international talent alongside domestic prospects
    confidence: high
    source: https://www.si.com/nba/spurs/onsi/news/everything-san-antonio-spurs-gm-brian-wright-said-after-2025-nba-draft
  head_coach:
    name: Mitch Johnson
    tenure_start: 2025-05
    contract_through: 2027
    style_notes: Emphasizes discipline, possession-by-possession defensive intensity, and controlled aggression. Physical perimeter defense; top-3 defensive rating in first season. Encourages players to impose will on opponents while embracing fundamentals. Contrasts with Popovich's system by being more direct/explosive.
    coaching_tree: popovich_tree
    confidence: high
    source: https://www.nba.com/news/mitch-johnson-named-spurs-coach
  assistant_coaches_notable:
    - Unknown (roster frozen as of as_of_date)
  notable_advisors_or_consultants:
    - Gregg Popovich (President of Basketball Operations; advisory/strategic role)
strategic_posture:
  timeframe: contend_soon
  confidence: high
  derived_from:
    - Acquired De'Aaron Fox as franchise cornerstone point guard (Feb 2025), signed max extension through 2029-30
    - Victor Wembanyama in Year 2 of rookie deal, eligible for rookie max extension July 2026
    - Made playoffs for first time since 2019; defeated Portland 4-1 in first round (2026 playoffs)
    - "Strong supporting cast: Stephon Castle (ROTY 2025), Devin Vassell ($146M extension), Keldon Johnson, Harrison Barnes"
    - "Draft arsenal: 36 picks over next 7 years (most in league); added Dylan Harper (#2), Carter Bryant (#14) in 2025"
    - Coaching transition to Mitch Johnson stabilized under Popovich health crisis (stroke Nov 2024)
  constraints:
    - reason_code: young_core_developing
      detail: Fox (peak), Wembanyama (year 2), Castle (rookie), Harper & Bryant (rookies) require development time before full contention window.
      weight: medium
    - reason_code: tax_apron_constraints
      detail: Payroll ~$187M (above first apron ~$168.8M); limited flexibility for mid-season acquisitions without shedding salary.
      weight: medium
    - reason_code: coaching_decision_pending
      detail: Mitch Johnson in first season as head coach (took over May 2025); system still being implemented; Popovich transition creates adjustment period.
      weight: low
  trigger_events:
    - Wembanyama signs rookie max extension (July 2026); locks core or signals dissatisfaction
    - Fox's production sustains >50 games played; durability track record unclear post-trade
    - Second-round exit in 2027 playoffs; contention window may be shorter than anticipated
    - New arena/market inflection; 'Project Marvel' (publicly funded arena) status uncertain as of as_of_date
  last_reviewed: 2026-05-02
