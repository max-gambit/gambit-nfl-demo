strategic_posture:
  timeframe: contend_now
  confidence: high
  derived_from:
    - Kawhi Leonard and James Harden both locked through 2026-27 (both $50M+ annual commitments); core expiration timeline signals 2027 reset opportunity
    - Despite 50-32 regular season in 2024-25, first-round exit (3-4 loss to Denver) triggered aggressive offseason overhaul
    - 2025-26 roster built around aging All-Stars (average age 33.2, oldest in NBA) with 21st-year Chris Paul—explicit contention bet
    - Play-in elimination (9-10 loss to Warriors Apr 2026) and midseason in-season trade (Zubac→IND) indicate triage mode by late March
    - Intuit Dome inflection (2nd season) creates arena/market leverage; FO leveraging infrastructure as retention/attraction tool
  constraints:
    - reason_code: max_contract_lockup
      detail: Kawhi and Harden combined ~$100M+/year through 2027; limits mid-tier free agent capacity
      weight: high
    - reason_code: aging_core
      detail: Roster average age 33.2 at season start; decline risk on Paul, Lopez, Beal; injury history (Bradley Beal hip fracture Nov 2025)
      weight: high
    - reason_code: recent_playoff_success
      detail: 50-32 in 2024-25 created expectations; first-round exit triggered front-office crisis and mid-season trades (Zubac, Harden)
      weight: medium
    - reason_code: ownership_directive
      detail: Ballmer's explicit championship mandate and spending tolerance drove pursuit of veteran All-Stars; failed assemblage signals strategic reset likely 2027
      weight: high
  trigger_events:
    - If Kawhi Leonard opts out (2027) or is traded mid-season 2026-27, contention window closes and rebuild begins
    - If Clippers re-sign Mathurin and Collins to long-term deals post-2026, signals pivot toward younger core
    - Intuit Dome operational issues or attendance decline below projections would force spending recalibration
  last_reviewed: 2026-05-02
