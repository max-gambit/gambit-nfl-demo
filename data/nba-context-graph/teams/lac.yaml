      - LA Clippers Assistant GM (2017-2023)
    public_philosophy_signals:
      - Lead evaluator and talent architect under Frank; focused on role-player depth and positional fit
      - Proponent of mid-season roster flexibility (traded Zubac for younger assets + picks)
    confidence: high
