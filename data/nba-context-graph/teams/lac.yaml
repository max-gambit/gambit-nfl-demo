    name: Lawrence Frank
    tenure_start: 2017-06
    prior_stops:
      - Detroit Pistons (Assistant GM, 2008-2017)
    public_philosophy_signals:
      - Emphasis on defensive identity and collective play over isolation scoring
      - Analytics-informed player evaluation; preference for size/athleticism/switchability
      - Willing to make aggressive mid-season trades to address perceived weaknesses (Zubac to IND Feb 2026 for Mathurin)
