cultural_signals:
  stability:
    value: medium
    detail: Coherent leadership (ownership 2.75 yrs, Peterson 2 yrs, Lee 2 yrs); aligned philosophy. Still early in regime; no extensions yet.
  player_friendly:
    value: mixed
    detail: Player-development emphasis and Kemba Walker on staff suggest player-friendly, but reporting on LaMelo dissatisfaction (Yahoo/Iko Nov 2025) and Spoelstra criticism after Adebayo incident indicate friction points.
  analytics_orientation:
    value: balanced
    detail: Peterson (BKN/ATL bg), VP Patrick Harrel (Basketball Insights & Analysis); Lee from Mazzulla/Budenholzer trees that lean modern. Not bleeding-edge but clearly modernizing under new regime.
  risk_tolerance:
    value: moderate
    detail: 2026 deadline showed willingness to act (5 trades) without overpaying picks or surrendering young core; willing to absorb salary; declined to chase Giannis or trade LaMelo.
  notable_traits:
    - developmental_org
    - process_driven
    - homegrown_priority
  rationale: Heavy investment in lottery picks (Ball, Miller, Salaun, Knueppel, McNeeley) plus retained young core through deadline, plus public Peterson statements emphasizing 'not skipping steps' and culture of player development.
  confidence: high
