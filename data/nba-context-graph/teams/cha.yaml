identity:
  name: Charlotte Hornets
  conference: Eastern
  division: Southeast
  market_tier: tier_3
  market_tier_rationale: Charlotte is a mid-size US TV market (~22nd DMA), no recent playoff equity (10-year playoff drought), and Forbes valuation ~$3.75B trails most large-market peers.
ownership:
  primary_owner:
    name: Gabe Plotkin and Rick Schnall (co-chairmen)
    type: group
    tenure_years: 2.75
    source: https://www.nba.com/news/michael-jordans-sale-of-majority-ownership-of-hornets-finalized
    confidence: high
  governance_notes: Plotkin (Tallwoods Capital) and Schnall (Clayton, Dubilier & Rice) acquired majority stake from Michael Jordan in Aug 2023 at ~$3B valuation; agreed to rotate governorship every 5 years, with Schnall first. Plotkin had been a minority owner and alternate governor since 2019.
  recent_transitions: August 3, 2023 majority sale from Michael Jordan to Plotkin/Schnall group, finalized after 29-1 BoG vote; Jordan retains minority stake. J. Cole and Eric Church among minority investors.
  spending_posture: moderate
  spending_posture_evidence:
    - 2025-26 active roster cap ~$158M; ranked 26th of 30 in payroll (Fanspo; Bleacher Report Apr 2026)
    - Operated below tax line ($14.4M room) at deadline yet acted as buyer (Hoopsrumors Feb 2026)
    - Plotkin public emphasis on patient, development-driven approach (WUNC/AP Aug 2023)
front_office:
  president_basketball_ops:
    name: Jeff Peterson
    tenure_start: 2024-03
    prior_stops:
      - Brooklyn Nets — Assistant GM (2019-2024)
      - Atlanta Hawks — Asst GM/Director of Scouting (2012-2019)
    public_philosophy_signals:
      - Process-driven rebuild; emphasizes player development and not skipping steps
      - Analytics-forward reputation (The Athletic 40 Under 40, 2022)
      - "Stated culture goal: hard work, development, togetherness (Pride Magazine)"
    confidence: high
    source: https://www.nba.com/hornets/news/charlotte-hornets-name-jeff-peterson-executive-vice-president-of-basketball-operations; https://www.wfae.org/sports/2026-04-20/charlotte-hornets-exec-optimistic-about-the-future
  general_manager:
    name: Dotun Akinwale (Assistant GM; no separate GM titled)
    tenure_start: 2024-05
    prior_stops:
      - Atlanta Hawks — VP of Player Personnel
    public_philosophy_signals:
      - Overlap with Peterson in Atlanta; player-personnel/scouting background
    confidence: medium
    source: https://atthehive.com/2024/05/16/charlotte-hornets-add-three-new-front-office-personnel/
  head_coach:
    name: Charles Lee
    tenure_start: 2024-05
    contract_through: 2028
    style_notes: Budenholzer/Mazzulla lineage — pace-and-space, 5-out spacing, three-heavy attack; player-development emphasis. Won NBA Coach of the Month for January 2026 after 9-game win streak.
    confidence: high
    source: https://www.espn.com/nba/story/_/id/40111769/charles-lee-agrees-4-year-deal-hornets-coach-sources-say; https://nbacoaches.com/charles-lee-hornets-staff-win-2025-26-cotm-for-january/
  assistant_coaches_notable:
    - Lamar Skeeter (lead asst, ex-Utah Jazz)
    - Josh Longstaff (lead asst, ex-Chicago Bulls; previously developed Coby White)
    - Chris Jent (lead asst, ex-Lakers; worked with Lee under Budenholzer in Atlanta)
    - Kemba Walker (Player Enhancement Coach)
  notable_advisors_or_consultants:
    - Mitch Kupchak — moved from President/GM to advisor Feb 2024 (continued status as of May 2026 unconfirmed)
    - Steve Clifford — moved to advisory role after stepping down as HC April 2024
strategic_posture:
  timeframe: retool
  confidence: high
  derived_from:
    - 44-38 finish, 9th in East (play-in eliminated by ORL Apr 17, 2026)
    - 2026 deadline activity as buyer acquiring Coby White/Conley while keeping core young assets (Hoopsrumors Feb 2026)
    - "Young core retained: Ball, Miller, Knueppel, Salaun, McNeeley, Diabate"
    - Public Peterson messaging on not skipping steps but building (CLTure exit interview)
  constraints:
    - reason_code: young_core_developing
      detail: Knueppel (20), Salaun (20), McNeeley (20), Miller (23), Ball (24) anchor core; rookie-scale lock-in for years
      weight: high
    - reason_code: new_front_office
      detail: Peterson (Mar 2024) and Lee (May 2024) only 2 years in; ownership 2.75 years in
      weight: medium
    - reason_code: multi_year_lottery
      detail: 10-year playoff drought; multiple top-6 picks in 2023/2024/2025
      weight: high
    - reason_code: ownership_directive
      detail: Plotkin/Schnall publicly emphasize patient, development-driven build
      weight: medium
  trigger_events:
    - April 17, 2026 play-in elimination by Orlando 121-90
    - 2026 NBA Draft order finalized: CHA owns No. 14 and No. 18
    - Brandon Miller / LaMelo Ball extension windows summer 2026
    - Coby White unrestricted free agency July 2026
  last_reviewed: 2026-05-02
