narrative_summary:
  one_paragraph: Charlotte enters May 2026 in a maturing rebuild led by Plotkin/Schnall ownership (since Aug 2023), Jeff Peterson as President of Basketball Ops (since Mar 2024), and Charles Lee as head coach (since May 2024 on a 4-year deal). The 2025-26 club went 44-38, made the play-in, and was eliminated by Orlando — its first winning season in four years and a 25-game improvement. The young core (Ball 24, Miller 23, Knueppel 20, Salaun 20, McNeeley 20, Diabate 24) is intact; Peterson acted as buyer at the Feb 5 2026 deadline, executing five trades to acquire Coby White and Mike Conley from Chicago without sacrificing core picks or young talent. Mark Williams was traded to Phoenix in June 2025 (post-rescinded LAL deal). The team is below the apron with significant cap flexibility, owns multiple incoming firsts (own 2026, PHX 2026, MIA 2027, DAL 2027, MIN-conditional 2029), and faces key 2026 offseason calls on Coby White (UFA, top priority), Brandon Miller extension, and Miles Bridges' expiring.
  three_things_to_watch:
    - "2026 draft board: official assets No. 14, No. 18 from ORL; The Athletic mock-source layer lists No. 14: Hannes Steinbach; No. 18: Christian Anderson Jr. as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - Coby White re-signing terms and Brandon Miller rookie-scale max extension
    - LaMelo Ball trade chatter recurrence and minutes/health management going into 2026-27
