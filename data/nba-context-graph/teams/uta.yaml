strategic_posture:
  timeframe: tank
  confidence: high
  derived_from:
    - Finished 22-60 in 2025-26, worst record in Western Conference by design
    - Traded away veteran rotation players (Clarkson, Collins, Sexton) in favor of 7 players under 23
    - Loaded draft assets; multiple first-round picks in next 5 years
    - Signaled development and asset-growth priority over immediate contention
  constraints:
    - reason_code: ownership_directive
      detail: Ryan Smith's public statements emphasize long-term competitive window, not short-term trades for veterans
      weight: high
    - reason_code: young_core_developing
      detail: Keyonte George, Walker Kessler, Ace Bailey, Isaiah Collier, Kyle Filipowski in first 3 seasons; development path critical
      weight: high
    - reason_code: multi_year_lottery
      detail: Four consecutive seasons without playoffs; lottery position secured through youth rotation
      weight: high
  trigger_events:
    - Unexpected mid-season trade of Jaren Jackson Jr. (Feb 2026) signals willingness to add established talent if young core development on track
    - Early playoff contention (top 8 seed by January) would trigger reassessment toward win-now
    - Major injury to Markkanen or Keyonte George could force re-pivot
  last_reviewed: 2026-05-02
