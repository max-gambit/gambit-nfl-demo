narrative_summary:
  one_paragraph: The Utah Jazz are executing a deliberate full-scale rebuild under a stable organizational structure anchored by Danny Ainge (CEO), Austin Ainge (President, newly hired from Boston), Will Hardy (Head Coach, extended through 2031), and Justin Zanik (GM). With Lauri Markkanen locked in long-term and a young core of seven players under 23 (George, Kessler, Bailey, Williams, Collier, Sensabaugh, Filipowski), the Jazz finished 22-60 in 2025-26 and are positioned for multi-year lottery contention. The mid-season acquisition of Jaren Jackson Jr. in February 2026 signals willingness to add established talent if the core develops on schedule. Asset-rich with future draft picks and veteran salary flexibility, the Jazz prioritize player development over immediate contention while maintaining a patient, process-driven culture.
  three_things_to_watch:
    - "2026 draft board: official assets No. 2; The Athletic mock-source layer lists No. 2: Darryn Peterson as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - "Keyonte George extension negotiations (offseason 2026): young star eligible for max-scale deal; JJJ trade signals franchise confidence in timeline."
    - "Walker Kessler restricted free agency (offseason 2026): RFA status with team matching control; cap flexibility challenged by Markkanen and JJJ deals."
    - "2026-27 competitive reset: JJJ trade mid-season may accelerate contention window; monitoring if additional veteran asset additions follow or if continued tank prioritized."
