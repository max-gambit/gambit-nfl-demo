cultural_signals:
  stability:
    value: high
    detail: |
      Same president (Pritchard) since 2017, same GM (Buchanan) since 2017, same head coach (Carlisle) since Nov 2021.
      Owner (Simon) tenure 42+ years with no meddling history. No executive turnover in past 5 years beyond typical assistant coaching moves.
  player_friendly:
    value: mixed
    detail: |
      No trade-clause history; contractual terms standard. Post-Finals narrative friendly (rewarded Carlisle with extension).
      However, willingness to trade Mathurin/Jackson mid-season and non-aggressive Turner retention could signal pragmatism over sentiment.
  analytics_orientation:
    value: balanced
    detail: |
      Rick Carlisle's motion-based, adaptive system reflects modern principles (spacing, pace, off-ball).
      Front office values playmaking and floor spacing (Haliburton, Siakam). Not a heavy analytics shop like Denver/Boston, but clearly data-informed.
  risk_tolerance:
    value: aggressive
    detail: |
      Traded 3 FRPs mid-season for Siakam during Finals push (2024-25). Willing to gut roster mid-season (Mathurin trade Feb 2026).
      However, refused Myles Turner's asking price ($47M+), showing discipline on value proposition.
  notable_traits:
    - process_driven
    - veteran_friendly
    - homegrown_priority
    - developmental_org
  rationale: |
    The Pacers organization under Pritchard/Buchanan/Carlisle has built a reputation for patience, stability, and process-focused team-building.
    Despite small-market constraints, the franchise avoids tanking and prioritizes sustained competitiveness.
    Recent Finals run showcases aggressive mid-season moves (Siakam), but measured long-term roster construction (young core development, no superstar trades out).
  confidence: high
