cultural_signals:
  stability:
    value: medium
    detail: Ownership transition (Ujiri → Webster) complete but relatively smooth; Rajaković contract extended through 2027. Roster continuity post-Ingram trade provides tactical stability; organizational clarity improving post-MLSE Rogers deal.
  player_friendly:
    value: mixed
    detail: Competitive core assembled; star players (Barnes, Ingram) on long-term deals. Mid-tier players (Barrett, Agbaji) face trade risk. Ujiri's departure may signal shift in player relationship philosophy.
  analytics_orientation:
    value: balanced
    detail: Webster known for analytical rigor; Rajaković emphasizes process and systematic defense. Balanced approach between data and veteran scouting tradition.
  risk_tolerance:
    value: aggressive
    detail: Ingram acquisition (trade deadline mid-season), mid-season Chris Paul deal, luxury tax willingness under new ownership.
  notable_traits:
    - developmental_org
    - process_driven
  rationale: Post-Ujiri transition stabilized under Webster and new ownership (Rogers). Team emphasizes organizational process and long-term core development (Scottie Barnes focus). Recent aggressive deadline moves (Ingram, Paul) and mid-season rotations show willingness to take calculated risks for playoff contention.
  confidence: medium
