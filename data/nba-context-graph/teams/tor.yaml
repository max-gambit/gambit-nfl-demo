narrative_summary:
  one_paragraph: "The Toronto Raptors re-emerged as an Eastern Conference contender in 2025-26, finishing 46-36 and claiming the 5th seed—their first playoff appearance since 2022. A transformative mid-season trade for Brandon Ingram (Feb 2025) from New Orleans jumpstarted the franchise after 30-52 (2024-25) and 28-54 (2023-24) campaigns. Ingram signed a 3-year/$120M extension and paired with franchise cornerstone Scottie Barnes (supermax, $225M/5yr) and complementary scorer RJ Barrett to form a contention core. Head coach Darko Rajaković, in his second season, led the team to their playoff breakthrough, becoming the first European-born HC to guide a team to the postseason; the Raptors also qualified for the NBA Cup knockout stage. Ownership transitioned significantly: President Masai Ujiri (13-year veteran) departed June 2025 following championship tenure; Rogers Communications acquired majority control of MLSE in July 2025, elevating spending posture. GM Bobby Webster was elevated to head of basketball operations in August 2025, providing continuity. The team sits above the first apron, constraining depth flexibility, but aggressive deadline moves (Chris Paul, Trayce Jackson-Davis in Feb 2026) signal commitment to contention. Critical near-term question: sustained chemistry and health of the Big Three through a full playoff run."
  three_things_to_watch:
    - "2026 draft board: official assets No. 19, No. 50; The Athletic mock-source layer lists No. 19: Jayden Quaintance as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - "Sustainability of Scottie Barnes + Brandon Ingram pairing: Both young stars on supermax-scale deals; first full postseason together; unproven durability and chemistry under playoff pressure."
    - "RJ Barrett's trajectory and impending UFA status: Emerging as tertiary scorer; becomes free agent 2027; extends or traded at deadline likely outcomes post-2026-27."
    - "Depth and cap flexibility post-2026: Hard-capped into second apron; limited room for deadline acquisitions; may require trade-heavy offseason to maintain contention window."
