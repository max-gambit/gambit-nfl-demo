narrative_summary:
  one_paragraph: The Oklahoma City Thunder enter 2025-26 as the defending NBA champions with an historically great roster construction and culture. Led by reigning MVP Shai Gilgeous-Alexander (supermax through 2030-31) and two ascending stars in Chet Holmgren and Jalen Williams (both max-extended through 2030), the Thunder secured a 24-1 start and finished 64-18 (1st West) with an elite defensive and pace-controlled offensive identity. Sam Presti's process-driven front office (19 years tenured) has locked the core while maintaining a war chest of 10+ first-round picks through 2032, enabling mid-season depth additions (Jared McCain trade) without sacrificing long-term flexibility. Mark Daigneault's coaching tree emphasizes fundamentals over flash, creating organizational stability across ownership (Clay Bennett, 18 years), coaching, and player development. Chet Holmgren's recurring hip/back injury is the primary health concern entering the latter half of the season and potential Finals run.
  three_things_to_watch:
    - "2026 draft board: official assets No. 12 from LAC, No. 17 from PHI, No. 37 from DAL; The Athletic mock-source layer lists No. 12: Yaxel Lendeborg; No. 17: Morez Johnson Jr. as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - "Chet Holmgren hip/back injury progression: recurring soreness (right hip contusion, Nov 2025) could escalate to season-ending concern if not load-managed; critical to Finals contention."
    - "Hartenstein club option leverage (June 2026): $28.5M decision point for 2026-27 cap planning; market value assessment will drive Thunder's mid-tier salary flexibility going forward."
    - "Draft capital deployment: Presti's 10+ first-round picks through 2032 are primary mid-season trade chip; resist asset depletion unless Finals run demands it."
