    value: heavy
    detail: Draft capital accumulation, advanced metrics integration, role-player optimization. Presti cites research methodologies (Caro). Process-driven rather than gut-feel.
  risk_tolerance:
    value: aggressive
    detail: Defended title with 95% of 2024-25 minutes rather than chasing marginal upgrades; aggressive cap positioning (above apron); mid-season trades to improve for now.
