narrative_summary:
  one_paragraph: The Chicago Bulls enter 2026 in full organizational reset mode following a catastrophic season (31-51, 12th East, fourth playoff miss). Ownership terminated Artūras Karnišovas and Marc Eversley on April 6, and Billy Donovan departed voluntarily. A front-office search is underway with John Paxson as interim lead. The team executed an aggressive trade deadline fire sale, dealing Coby White, Nikola Vučević, and Kevin Huerter for guard depth (Sexton, Simons) and accumulated nine future second-round picks—a signal of prioritizing asset flexibility over immediate contention. Young core anchors Josh Giddey (4yr/$100M extension), Matas Buzelis (2024
  three_things_to_watch:
    - "2026 draft board: official assets No. 4, No. 15 from POR, No. 38 from NOP, No. 56 from DEN; The Athletic mock-source layer lists No. 4: Caleb Wilson; No. 15: Cameron Carr as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - New basketball president/GM hire and their stated timeline for contention (contend_now vs. retool vs. rebuild)
    - Josh Giddey's performance trajectory and whether extension investment pays dividends in 2026-27 season
