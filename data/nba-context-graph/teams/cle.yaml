identity:
  name: Cleveland Cavaliers
  conference: Eastern
  division: Central
  market_tier: tier_2
  market_tier_rationale: Major U.S. market (Cleveland metro ~2M), strong regional fanbase, NBA-ready arena, recovering market post-LeBron era.
ownership:
  primary_owner:
    name: Dan Gilbert
    type: individual
    tenure_years: 21
    source: https://en.wikipedia.org/wiki/Dan_Gilbert
    confidence: high
  governance_notes: Gilbert owns 72% majority stake; exploring sale of up to 15% minority stake (June 2025 announcement via Allen & Company).
  recent_transitions: none
  spending_posture: aggressive_spender
  spending_posture_evidence:
    - Total payroll $228.9M in 2025-26; $24.5M over luxury tax threshold.
    - Extended Evan Mobley to $224M+ deal; extended Donovan Mitchell to $150.3M deal; extended Jarrett Allen to $91M deal.
    - Multiple mid-season acquisitions (Harden, Schroder, Ellis) despite second-apron constraints.
front_office:
  president_basketball_ops:
    name: Koby Altman
    tenure_start: 2017-06
    prior_stops:
      - Detroit Pistons (asst. GM)
      - Portland Trail Blazers (director of scouting)
    public_philosophy_signals:
      - "On James Harden acquisition: 'We made a monumental trade...he raises our ceiling.'"
      - "On Schroder: 'Dennis raises his level at the highest level...when stakes are highest, that's when Dennis raises his level.'"
      - Extended through 2030; committed to contention window.
    confidence: high
    source: https://www.nba.com/news/koby-altman-cavaliers-extension
  general_manager:
    name: Mike Gansey
    tenure_start: 2020-06
    prior_stops:
      - Denver Nuggets (director of college scouting)
      - various scout roles
    public_philosophy_signals:
      - "On Tyrese Proctor: attracted to his ability to 'play on and off the ball' with '40% shooting from three.'"
      - Focused on talent evaluation; extensive road scouting.
    confidence: high
    source: https://clevelandmagazine.com/articles/mike-gansey-general-manager-for-the-cleveland-cavaliers-most-interesting-people-2025/
  head_coach:
    name: Kenny Atkinson
    tenure_start: 2024-06
    contract_through: "2028"
    style_notes: Motion-based, pace-oriented offense ("Autobahn" floor spacing concept); high three-point volume (1,303 made in 2024-25); analytical, player-development focused; emphasis on communication and relationships.
    coaching_tree: D'Antoni tree (via 2008-2012 Knicks assistant under D'Antoni); Budenholzer tree (2012-2016 Hawks assistant).
    confidence: high
    source: https://www.nba.com/news/nba-coach-of-the-year-2024-25-kenny-atkinson
  assistant_coaches_notable:
    - Johnnie Bryant, Associate Head Coach
    - Jawad Williams, Assistant Coach (hired 2025)
  notable_advisors_or_consultants: []
strategic_posture:
  timeframe: contend_now
  confidence: high
  derived_from:
    - "64-18 record in 2024-25; #1 East seed."
    - Mid-season James Harden acquisition at trade deadline 2025-26.
    - Multiple star extensions (Mitchell, Mobley, Allen) signal 'go-for-it' window.
    - Second-apron hard cap acceptance; prioritizing on-court moves over future flexibility.
  constraints:
    - reason_code: tax_apron_constraints
      detail: Locked in second apron at $212.3M+ payroll; severe restrictions on trade exceptions, salary movements, minimum salaries.
      weight: high
    - reason_code: max_contract_lockup
      detail: Core four (Mitchell $46.4M, Mobley $38.7M, Garland $39.4M, Allen $20M) consume majority of cap.
      weight: high
    - reason_code: recent_playoff_success
      detail: 64-win season built urgency to extend window; lost in ECF to Pacers (4-1) despite dominance—'go-for-it-now' mentality.
      weight: high
  trigger_events:
    - Second-round playoff exit (2024-25) signals window not fully realized; 2025-26 performance will determine if core stays together.
    - Donovan Mitchell player option (2027-28) creates 2-year contention imperative.
    - If payroll/apron situation forces mid-season salary dumps or rotation changes, posture shifts to retool.
  last_reviewed: 2026-05-02
cap_situation:
  current_status: second_apron
  current_payroll_estimate: 212345289
  hard_capped: yes
  hard_cap_reason: Traded player acquisitions (Harden, Schroder) triggered apron crossing; second-apron hard cap of $207.8M.
  flexibility_windows:
    - season: 2026-27
      projected_status: Remaining in second apron. Mobley extension raises cap hit further; no meaningful flexibility until late 2027.
    - season: 2027-28
      projected_status: Potential inflection if Mitchell exercises player option or signs extension; window for reconfiguration.
  exceptions_available:
