cultural_signals:
  stability:
    value: high
    detail: Koby Altman extended through 2030; Kenny Atkinson hired for multi-year deal. Org appears locked in on core identity.
  player_friendly:
    value: mixed
    detail: Aggressive spending on retention (Mobley, Mitchell extensions) suggests willingness to reward talent; second-apron constraints may limit mid-contract flexibility.
  analytics_orientation:
    value: heavy
    detail: Atkinson's motion offense driven by spacing analytics; Gansey's scouting emphasis on advanced metrics (three-point shooting, %). Analytics consultants likely involved in trade decisions.
  risk_tolerance:
    value: aggressive
    detail: Mid-season Harden trade despite being second-apron; large extensions on young cores; aggressive draft picks (Proctor at 49 despite 'first-round grade').
  notable_traits:
    - process_driven
    - developmental_org
    - coach_relationship
    - star_chasing
  rationale: Cavaliers lean on player development (Mobley, Tyson trajectory tracking), coach-player relationship building (Atkinson's philosophy), and aggressive acquisition of star talent mid-season (Harden) despite cap constraints. Org philosophy reflects belief that contention now outweighs flexibility later.
  confidence: medium
