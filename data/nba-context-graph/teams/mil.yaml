strategic_posture:
  timeframe: retool
  confidence: medium
  derived_from:
    - 32-50 record in 2025-26; first playoff miss in 10 years; missed playoffs for first time since 2016.
    - Damian Lillard waived mid-season (Achilles tear, sat entire 2025-26 season); Khris Middleton traded for Kyle Kuzma (February 2025, viewed as Wizards win). Core fit issues evident.
    - "Ownership willing to spend: signed Myles Turner (4yr/$107M with 15% kicker, player option) and retained Bobby Portis (3yr/$44M), Cole Anthony, Gary Harris. Not full rebuild; still competitive intent around Giannis."
    - Doc Rivers stepped down post-season; Taylor Jenkins hired as retool-phase coach (proven playoff builder, turnaround experience).
    - Jon Horst extended mid-April 2025 (before season end) signals long-term mandate; FO stability despite performance decline.
  constraints:
    - reason_code: max_contract_lockup
      detail: Giannis ($54.1M 2025-26, $58.4M 2026-27, $62.7M PO 2027-28) + Myles Turner ($26.75M) + Kyle Kuzma ($21.5M) consumes ~$102M annually; large commitment to 3 players limits bench flexibility.
      weight: high
    - reason_code: aging_core
      detail: Lillard out (injured); Middleton traded at age 33. Giannis at peak age (30); Turner at 29; reliance on health of two max-level players.
      weight: medium
    - reason_code: tax_apron_constraints
      detail: Currently $6.5M below tax line but ownership signaled reluctance to pay; restricts mid-season trades or major additions.
      weight: medium
    - reason_code: coaching_decision_pending
      detail: New HC Jenkins (hired May 2026) will shape roster continuity/trade direction; cultural reset required after Doc Rivers' 32-50 tenure.
      weight: medium
  trigger_events:
    - Giannis explicit commitment or departure demand would reset entire franchise vector.
    - Mid-season injury to Giannis or Turner; depth tested given bench-heavy roster.
    - Myles Turner performance/availability; recent trade rumors suggest he may be shopped if roster underperforms early 2026-27.
  last_reviewed: 2026-05-02
