cultural_signals:
  stability:
    value: medium
    detail: Doc Rivers departed after 32-50 season (3 years, 97-103 record); Taylor Jenkins hired within weeks. FO stable (Horst extended mid-April 2025), ownership united, but coaching carousel initiated. GM stability supports medium rating.
  player_friendly:
    value: yes
    detail: Giannis extended repeatedly (2017, 2021, 2025); willingness to re-sign vets (Portis, Harris, Trent, Prince at market rates or discounts). Recent trade activity suggests player movement respected (Middleton, Lillard transitions managed). No public locker-room friction reported.
  analytics_orientation:
    value: balanced
    detail: Director of Basketball Research (Seth Partnow legacy) brings baseball analytics perspective; problem-solving emphasizes data + coaching eyes + locker-room ears. Described as pragmatic rather than dogmatic; roster composition mixes advanced metrics with veteran leadership (Portis, Harris, Prince).
  risk_tolerance:
    value: moderate
    detail: Willingness to trade stars (Middleton, Lillard) for cap relief and retool; signed Turner with 15% trade kicker despite roster uncertainty. Balanced between aggressive trades and conservative tax spending; ownership reluctance to pay tax signals moderate rather than aggressive posture.
  notable_traits:
    - homegrown_priority
    - coach_carousel
    - process_driven
    - star_chasing
  rationale: Bucks drafted Giannis in-house and extended him thrice (homegrown centerpiece). Recent coaching turnover (Griffin, Rivers, Jenkins) and front-office reshuffles during retool phase show carousel tendencies. Process-driven via analytics investment and transparent FO communication. Star-chasing evident in Lillard acquisition (2024), Turner signing (2025).
  confidence: medium
