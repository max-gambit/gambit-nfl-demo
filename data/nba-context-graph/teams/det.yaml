strategic_posture:
  timeframe: contend_now
  confidence: high
  derived_from:
    - 60-22 regular season record (2025-26), East's top seed with 1st playoff seed since 2007
    - 44-38 record in 2024-25 marked first playoff appearance since 2019 after 14-win 2023-24 season (largest one-year turnaround in NBA history)
    - Cade Cunningham All-NBA third team selection; emerging as franchise cornerstone
    - Supporting cast includes All-Star/Star-caliber players in Jalen Duren, Ausar Thompson, Tobias Harris
    - Currently in Game 7 vs Orlando Magic (#8 seed) as top seed, demonstrating playoff viability
  constraints:
    - reason_code: young_core_developing
      detail: Cunningham (22), Duren (21), Thompson (21) still ascending; core durability unproven over long playoff runs.
      weight: medium
    - reason_code: max_contract_lockup
      detail: Cunningham's $269M extension through 2029 (escalated by All-NBA) constrains cap flexibility long-term.
      weight: high
    - reason_code: recent_playoff_success
      detail: Two consecutive playoff runs (2024-25, 2025-26) demonstrate progress but no Finals experience yet; sustainability uncertain.
      weight: medium
  trigger_events:
    - Cunningham or core players develop significant injury
    - Championship-window miss in next 2-3 years prompts retool pivot
    - Trade deadline acquisitions in next 2-3 years reflect shift to depth/veteran additions vs. youth development
  last_reviewed: 2026-05-02
