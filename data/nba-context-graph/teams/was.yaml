narrative_summary:
  one_paragraph: The Washington Wizards endured their second consecutive lottery season (17-65 record), pursuing a youth-development rebuild under new President Michael Winger and GM Will Dawkins. The core—Alex Sarr (age 21, franchise centerpiece), Bub Carrington (lead guard, age 20), Bilal Coulibaly (wing, age 21), and Tre Johnson (rookie guard, age 20)—forms one of the NBA's youngest rosters. However, owner Ted Leonsis and Winger shifted course mid-season, acquiring All-Stars Trae Young (January 2026) and Anthony Davis (February 2026) in blockbuster trades, signaling a pivot toward contention if both recover from injuries. The move contradicted the pure rebuild narrative but reflects Leonsis's impatience and confidence in the young core. Retained head coach Brian Keefe and an aggressive offseason (2026 No. 1 pick secured) suggest the organization is now targeting a 2026-27 competitive window, contingent entirely on Young and Davis health.
  three_things_to_watch:
    - "2026 draft board: official assets No. 1, No. 51 from MIN, No. 60 from OKC; The Athletic mock-source layer lists No. 1: AJ Dybantsa as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - "Health recovery of Trae Young and Anthony Davis: Both missed significant time in 2025-26 due to shoulder and hand/groin injuries, respectively. If either plays <40 games in 2026-27, the contention timeline resets."
    - "Alex Sarr's ascent: At 21, the 2024 second overall pick emerged as the young core's best player (16.3 ppg, 7.4 rpg, 2.0 bpg). Sarr's two-way development will determine whether the youth core becomes a dynasty or another missed rebuild."
    - "Ownership patience on rebuild completion: Leonsis committed to a five-year rebuild but mid-season trades signal he may reset expectations. If the 2026-27 season yields <30 wins and no playoff path emerges, aggressive trade deadline moves or coaching changes could accelerate."
