strategic_posture:
  timeframe: rebuild
  confidence: high
  derived_from:
    - 17-65 record (worst in NBA) confirms youth-first strategy with limited win-now pretense.
    - Trae Young and Anthony Davis acquisitions January–February 2026 signal medium-term contention target (2026-27 onward).
    - "Leonsis public statements: 'these are the years to not be competitive' given strength of next two drafts; expects rebuild completion in 5 years total (3 years elapsed, 2 remaining as of 2026)."
    - Deep roster youth (Alex Sarr age 20, Bub Carrington age 20, Tre Johnson age 20, Bilal Coulibaly age 21) precludes immediate contention.
  constraints:
    - reason_code: young_core_developing
      detail: Five first-year and second-year players in core rotation; chemistry and development cycle require 1–2 more seasons.
      weight: high
    - reason_code: multi_year_lottery
      detail: Two consecutive seasons of worst-in-NBA records (2024-25, 2025-26) means ceiling is constrained by injury to stars (Young, Davis).
      weight: high
    - reason_code: recent_playoff_success
      detail: Negative constraint—zero playoff appearance since 2023; fanbase and owner patience finite.
      weight: medium
  trigger_events:
    - Trae Young and Anthony Davis health status determines 2026-27 trajectory; if both play <50 games again, rebuild reset likely.
    - 2026 NBA Draft Lottery win gives WAS the No. 1 pick; top-of-draft prospect decision can accelerate the rebuild timeline.
    - "Mid-season 2026-27 record inflection: if <25 wins by All-Star break, Leonsis may lose patience and pivot to aggressive trade targets."
  last_reviewed: 2026-05-02
