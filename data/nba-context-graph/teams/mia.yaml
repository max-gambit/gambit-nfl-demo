narrative_summary:
  one_paragraph: The Miami Heat stand at a critical crossroads. After reaching the NBA Finals in 2023, they have declined to a 10th-seed play-in exit in 2026 (43-39 record), losing to Charlotte in OT. Pat Riley remains committed to contention, explicitly stating he will not retire or step aside and declaring Bam Adebayo (28, star, untouchable) the franchise centerpiece. The organization intends to clear $80M+ in cap space this offseason to pursue elite star talent (Jokic, Morant, Leonard tier), betting on their development system and defensive identity to retain competitiveness. Tyler Herro (26, injuries limiting 2025-26), Andrew Wiggins (31, player option pending), and emerging wing Jaime Jaquez Jr. (24, ascending) round out the core. However, payroll constraints (operating between aprons) and recent underperformance have created roster stagnation requiring aggressive external moves. The Heat's organizational stability (Spoelstra 18 years, Elisburg 13 as GM, Riley 31 as president) and defensive-first culture remain competitive advantages, but the window to recapture 2023-24 contention legitimacy narrows.
  three_things_to_watch:
    - "2026 draft board: official assets No. 13, No. 41 from GSW; The Athletic mock-source layer lists No. 13: Labaron Philon Jr. as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - Will Miami successfully clear $80M+ cap space and land a star-tier free agent (Jokic, Morant), or will ownership/cap limitations force modest upgrades and gradual retool?
    - How do Herro's injury recovery and availability impact his trade value and extension negotiations? Extension window closes July 2026.
    - Does the homegrown youth core (Jaquez, Ware, Jovic) develop sufficiently to justify passing on higher draft picks, or does near-term competitive pressure force a midseason pivot?
