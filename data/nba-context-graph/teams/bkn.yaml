cultural_signals:
  stability:
    value: medium
    detail: Coach extended through 2027+; GM in place since 2016 (10 years tenure). However, franchise went through multiple head coaches (7 since Marks hired) until Fernandez hire. Current stability signals commitment to rebuild, but volatility in coaching history tempers assessment.
  player_friendly:
    value: mixed
    detail: Extended Fernandez coaching staff and offered Nic Claxton $100M extension ($25.4M/yr for 2025-26). However, waived Cam Thomas mid-season despite 15.6 PPG without extension offer. Front office prioritizes young development over veteran accommodation.
  analytics_orientation:
    value: heavy
    detail: Logan MacPhail (Analytics Director) hired from San Antonio Spurs. Team publicly uses advanced metrics and player valuation models for trade/FA decisions. Roster built via lottery optimization and cap flexibility rather than free-agent spending.
  risk_tolerance:
    value: aggressive
    detail: Spent 5 first-round picks in single draft (2025) on unproven young talent; acquired Michael Porter Jr. on long-term extension despite injury concerns; extended Fernandez and entire staff after 46-118 two-year record.
  notable_traits:
    - developmental_org
    - process_driven
    - homegrown_priority
  rationale: Nets prioritize long-term player development and internal infrastructure (Fernandez extension, analytics hire) over immediate competitiveness. Tsai's willingness to publicly embrace rebuild signals organizational patience. Analytics-driven decision-making inherited from Marks' Spurs background shapes all personnel moves.
  confidence: medium
