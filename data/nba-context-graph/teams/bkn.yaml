narrative_summary:
  one_paragraph: "The Brooklyn Nets completed their first full rebuild season (20-62, 2025-26) under owner Joe Tsai's explicit pivot toward long-term youth development and draft capital accumulation. General Manager Sean Marks and newly extended head coach Jordi Fernandez deployed five first-round picks (Egor Demin #8, Nolan Traore #19, Drake Powell #22, Ben Saraf #26, Danny Wolf #27) in 2025 to build the league's youngest roster (half under 24). Michael Porter Jr., acquired mid-offseason for Cameron Johnson, emerged as a star (24.2 PPG, 46.3 FG%), while Nicolas Claxton (extension through 2029) anchored the rebuild core. With only 144.3M payroll and 91.8M cap space, Brooklyn now owns the 2026 No. 6 pick while Houston swap rights on the 2027 pick keep draft optimization central. Coach Fernandez's entire staff received multi-year extensions despite losing record, signaling organizational commitment to development over immediate wins."
  three_things_to_watch:
    - "2026 draft board: official assets No. 6, No. 33, No. 43 from LAC; The Athletic mock-source layer lists No. 6: Darius Acuff Jr. as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - "Michael Porter Jr. extension negotiation: eligible for max deal; publicly expressed desire to stay; will signal Nets' willingness to build around star vs. pivot again."
    - "Day'Ron Sharpe's post-surgery trajectory: UCL recovery critical to 2026-27 core; expiring contract requires re-signing or trade decision by summer 2026."
