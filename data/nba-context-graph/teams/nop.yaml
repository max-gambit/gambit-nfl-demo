strategic_posture:
  timeframe: rebuild
  confidence: high
  derived_from:
    - 26-56 finish (2025-26 season); 11th in West; lottery result sent the No. 8 pick to Atlanta; did not make playoffs for 3rd consecutive season.
    - Multiple trades of veteran complementary pieces (Brandon Ingram to TOR in Feb 2025, Jose Alvarado deadline deal, CJ McCollum exit).
    - "Draft pivot: back-to-back high lottery picks (Fears #7, Queen #13 via trade-up); 2026 first-round pick traded away (to Hawks for Queen)."
    - Zion Williamson availability and health remain unresolved; Dejounte Murray Achilles injury severely limits 2025-26 impact (14 games).
  constraints:
    - reason_code: aging_core
      detail: Zion (25) and Dejounte (29, post-injury) represent the core, but Zion's health/conditioning clauses and Murray's Achilles status create durability risk.
      weight: high
    - reason_code: multi_year_lottery
      detail: Three consecutive seasons out of playoffs (2023-24, 2024-25, 2025-26); 2026 first-round pick conveyance to Atlanta lengthens the rebuild margin for error.
      weight: high
    - reason_code: new_front_office
      detail: Joe Dumars hired April 2025; needs 2-3 seasons to fully reshape roster and establish system identity.
      weight: medium
  trigger_events:
    - Zion Williamson sustained, injury-free season (60+ games) with positive conditioning compliance; mid-tier playoff seeding.
    - Jeremiah Fears or Derik Queen emergence as legitimate all-star caliber player within 18 months.
    - Trade acquisition of a secondary star-level playmaker/scorer to pair alongside Zion.
  last_reviewed: 2026-05-02
