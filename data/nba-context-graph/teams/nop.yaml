cultural_signals:
  stability:
    value: low
    detail: Three coaching changes in four seasons (Alvin Gentry exit 2022 → Willie Green 2021-2025 → James Borrego mid-season 2025-26). Uncertainty around Borrego's permanent status as of May 2026.
  player_friendly:
    value: mixed
    detail: Benson ownership approved aggressive trades (Ingram, McCollum exits) mid-season; however, early contract extensions offered to young players (Fears/Queen rookie deals standard). Zion's unique conditioning-based guarantees create tension.
  analytics_orientation:
    value: balanced
    detail: Dumars' Sacramento stint and NBA office role suggest analytics-informed approach. Draft picks (Fears, Queen) emphasize high-ceiling, positionless play. Cap modeling and trade evaluation appear data-driven.
  risk_tolerance:
    value: aggressive
    detail: Willingness to trade unprotected first-round picks (2026 to ATL); aggressive mid-season coaching change; multiple simultaneous roster overhauls.
  notable_traits:
    - coach_carousel
    - star_chasing
    - young_core_developing
  rationale: The Pelicans have experienced repeated coaching instability and front-office churn, culminating in Dumars' hire and mid-season pivot. Recent trades indicate aggressive youth prioritization over veteran continuity. However, ownership remains committed to Zion and is willing to absorb cap penalties for young talent development.
