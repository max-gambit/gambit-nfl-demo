narrative_summary:
  one_paragraph: "The New Orleans Pelicans completed a historically disastrous 2025-26 season (26-56, 11th West, missed playoffs for third straight year) that culminated in the firing of Willie Green and promotion of James Borrego to interim head coach in November 2025. New basketball operations chief Joe Dumars, hired in April 2025 from the NBA league office, orchestrated a youth-first rebuild, acquiring high-upside guards in the 2025 draft (Jeremiah Fears #7, Derik Queen #13 via trade-up), while shedding veteran complementary pieces (Brandon Ingram to TOR, CJ McCollum to WAS, Jose Alvarado at deadline). Zion Williamson remains the franchise cornerstone at 25, but his durability and conditioning-based guarantees create uncertainty; Dejounte Murray's Achilles injury (January 2026) severely limited impact in Year 1 of his acquisition. The core now centers on three promising rookies (Fears, Queen, Micah Peavy), young wings with shooting upside (Trey Murphy, Herb Jones, Saddiq Bey), and lottery-pick center Yves Missi. Jordan Poole, acquired in the McCollum swap, was removed from the rotation mid-season due to failed fit, creating a significant trade asset to explore for cap relief. The 2026 offseason will define the franchise: decisions on Borrego's permanent status, Murray's future, Poole's tradability, and whether Fears/Queen can develop into legitimate co-stars alongside Zion."
  three_things_to_watch:
    - "2026 second-round board: official assets No. 58 from DET; use mocked second-round names as low-confidence depth or rights leads, not rotation assumptions."
    - "Jeremiah Fears / Derik Queen ceiling: Do either 2025 rookies emerge as a bonafide star-level player within 18 months to accelerate the rebuild timeline?"
    - "Zion durability and commitment: Can Williamson remain healthy 60+ games and comply with conditioning clauses, or will injury uncertainty force a franchise pivot?"
    - "Post-Achilles Dejounte Murray: Will medical clearance and on-court productivity justify keeping $30M/year guard, or does Dumars pivot to trade him and reallocate salary?"
