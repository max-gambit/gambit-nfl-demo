cultural_signals:
  stability:
    value: medium
    detail: New HC in Year 2 (Jordan Ott); roster underwent major reset (KD departure, Beal buyout) but ownership and GM committed to continuity. FO relatively stable since Gregory hire.
  player_friendly:
    value: yes
    detail: Extended homegrown star Booker to historic deal; hired HC with player-development pedigree (Ott); receptive to veteran input (DeMarre Carroll hired as coach).
  analytics_orientation:
    value: balanced
    detail: Gregory emphasizes data-driven roster construction and cap optimization; however, Ott-era coaching appears balanced between analytics and traditional defensive/pace principles.
  risk_tolerance:
    value: aggressive
    detail: Willing to make bold trades (7-team KD deal); aggressive spending despite apron constraints; hired unproven HC (Ott) on 4-year deal.
  notable_traits:
    - star_chasing
    - process_driven
    - process_driven
  rationale: Ownership (Ishbia) remains aggressive and willing to spend for competitiveness. Gregory's tenure has emphasized sustainability via youth and cap flexibility, representing a pivot from pure star-chasing of 2024-25. Ott's defensive/culture-building mandate shows organizational learning from prior volatility.
  confidence: medium
