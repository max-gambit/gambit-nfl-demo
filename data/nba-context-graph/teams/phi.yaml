    - Bob Cooney (associate head coach, significant role in player development)
    - Charles Lee (prior associate HC, promoted externally)
    - Dave Addy (defensive coordinator, box-and-one specialist)
  notable_advisors_or_consultants:
    - Bob Myers (HBSE Sports President, October 2025 hire; oversight role, not day-to-day)
    - Internal analytics team led by Morey (AI disclosed for trade decisions)
strategic_posture:
  timeframe: contend_now
  confidence: medium
  derived_from:
    - Big Three (Embiid, George, Maxey) under contract through 2026-27 and designed to compete immediately
    - Season record of 45-37 and playoff qualification (7th seed) validates mid-tier contender status
    - Health volatility constrains ceiling; Embiid played only 38 games in 2025-26, George played 62
    - Trade deadline moves (McCain sale, Eric Gordon dump) suggest pivot toward flexibility over deepening roster
    - 2026 NBA Playoffs Game 7 vs. Boston Celtics ongoing (as of 2026-05-02)
  constraints:
    - reason_code: aging_core
      detail: Paul George is 36 years old; contention window closing post-2027
      weight: high
    - reason_code: max_contract_lockup
      detail: Embiid ($58.1M 2026-27), George ($54.1M 2026-27), Maxey ($40.8M 2026-27) limit trade flexibility
      weight: high
    - reason_code: injury_recovery_uncertain
      detail: Embiid appendectomy in late April 2026; chronic knee issues limit durability
      weight: high
    - reason_code: recent_playoff_success
      detail: Beat Magic in play-in, facing Celtics in first round; ownership expects continued progress
      weight: medium
  trigger_events:
    - Embiid's health status and appendectomy recovery in playoff run
    - Outcome of 2026 Celtics series (Game 7 ongoing as of May 2, 2026)
    - Free agency availability of George in 2027-28 (has player option)
  last_reviewed: 2026-05-02
