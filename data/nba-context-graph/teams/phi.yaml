front_office:
  president_basketball_ops:
    name: Daryl Morey
    tenure_start: 2020-11
    prior_stops: Houston Rockets VP/GM (2007-2020), Philadelphia 76ers Assistant GM (2003-2007)
    public_philosophy_signals:
      - Analytics-heavy decision-making; disclosed use of AI for trade evaluation in March 2025
      - Willing to trade young assets mid-season if perceived value trade available (McCain sale)
      - Prioritizes draft capital accumulation and roster flexibility over continuity
      - Stated commitment to 76ers organization in April 2025 following Morey-Nurse contract extensions
    confidence: high
    source: https://www.espn.com/nba/story/_/id/30210731
  general_manager:
    name: Elton Brand
    tenure_start: 2020-11
    prior_stops: Chicago Bulls EVP Basketball Operations (2016-2020), Atlanta Hawks Assistant GM (2013-2016), Philadelphia 76ers (2008-2013)
    public_philosophy_signals:
      - Supporting Morey's analytics framework while leveraging prior relationship history within NBA
      - Focused on cap management and finding undervalued veteran role players
      - Committed to 76ers through upcoming offseason; withdrew from Hawks GM search in May 2025
    confidence: high
    source: https://www.nba.com/news/philadelphia-76ers-elton-brand-named-general-manager-official-release
  head_coach:
    name: Nick Nurse
    tenure_start: 2023-06
    contract_through: 2027
    style_notes: Experimental, unconventional defensive schemes (box-and-one, triangle-and-two); data-driven lineup construction; emphasizes player development and individual skill training; high-pace, creative offensive sets
    coaching_tree: Developed under Fred Donovan (Raptors assistant structure); not primarily associated with any dominant tree
    confidence: high
    source: https://www.nba.com/sixers/76ers-coaches/nick-nurse
