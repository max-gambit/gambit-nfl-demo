cultural_signals:
  stability:
    value: low
    detail: Doug Christie interim to permanent (Dec 2024 → May 2025); Monte McNair replaced by Scott Perry after 22-60 season; roster turnover after 2024-25 play-in loss; coaching changes under both Brown and now Christie indicate instability.
  player_friendly:
    value: mixed
    detail: Christie emphasizes communication and player empowerment; recent moves (Fox trade) signal willingness to move disgruntled stars. Arena (Golden 1) is world-class. But frequent roster churn and front-office volatility complicate the message.
  analytics_orientation:
    value: balanced
    detail: Perry (Knicks analytics-forward background) balanced with Ranadivé's ownership influence and Christie's player-development focus; no clear dominant signal from available statements.
  risk_tolerance:
    value: aggressive
    detail: Fox trade mid-season for uncertain return; heavy luxury tax spending; aggressive mid-market signings (LaVine, DeRozan, Schröder, Westbrook).
  notable_traits:
    - process_driven
    - star_chasing
    - coaching_decision_pending
  rationale: Kings history shows cycles of hope (2023 playoff run) followed by reactionary desperation (Fox trade, aggressive veteran signings, 22-60 collapse). Ranadivé engaged but sometimes overextends; Perry brings discipline but faces unstable roster. Christie's steady defensive philosophy offers stability, but organizational pattern suggests churn.
  confidence: medium
