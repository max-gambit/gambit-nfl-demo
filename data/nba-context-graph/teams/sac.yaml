narrative_summary:
  one_paragraph: The Sacramento Kings entered 2026 in crisis after a devastating 22-60 season marked by failed star-chasing experiments and front-office turnover. General manager Scott Perry (hired April 2025 to replace Monte McNair) and newly permanent head coach Doug Christie attempt to stabilize an organization with a $193M payroll in crisis. The core of Domantas Sabonis (29, $42.3M), Zach LaVine (30, $45.9M, player option 2027), and DeMar DeRozan (36) proved incompatible, yet trading stars (Fox to SAS in Feb 2025) yielded uncertain returns. Ranadivé's willingness to spend ($225M projected 2026-27 payroll) collided with tax-averse structural preferences. Young talent (Keegan Murray, Devin Carter, Nique Clifford, Maxime Raynaud) plus the 2026 No. 7 pick offer developmental hope. Perry's six-point organizational identity (competitive, tough, team-oriented, accountable, disciplined, professional) represents a reset, but the team faces imminent cap decisions and trades to navigate the luxury tax penalty zone while balancing win-now urgency against rebuild necessity.
  three_things_to_watch:
    - "2026 draft board: official assets No. 7, No. 34, No. 45 from CHA; The Athletic mock-source layer lists No. 7: Kingston Flemings as prospect leads, with non-top-four names treated as low-confidence pre-draft fit signals."
    - "Zach LaVine's 2027 player option decision: if exercised, locks Kings into $45.9M; if declined, opens 2028 free agency and cap flexibility."
    - "Trade deadline 2027 activity: DeRozan's partially guaranteed contract, Hunter's $25M expiring deal, and LaVine's optionality make Kings active sellers if 2026-27 development stalls."
