strategic_posture:
  timeframe: retool
  confidence: medium
  derived_from:
    - 22-60 record in 2025-26; worst in Western Conference and franchise's first 60-loss season since 2008-09.
    - Core group (Sabonis, LaVine, DeRozan) assembled via Feb 2025 3-team trade; roster blending veterans with young talent (Clifford, Raynaud, Carter, Murray).
    - GM Perry stated patience needed; implied timeline of 2-3 years to playoff contention with draft lottery support.
    - Payroll $193M vs $187.9M luxury tax; team signaled no plans to exceed penalty line in 2026-27.
  constraints:
    - reason_code: max_contract_lockup
      detail: Sabonis ($42.3M), LaVine ($45.9M), DeRozan ($24.5M) locked through 2026-27; limited cap flexibility.
      weight: high
    - reason_code: recent_playoff_success
      detail: 2023 playoff appearance (48-34, 3rd West) created urgency to maintain contention that backfired; led to reactionary trades (Fox to SAS Feb 2025).
      weight: medium
    - reason_code: market_pressure
      detail: Small-market status limits free agent appeal; draft and development are primary paths to sustained success.
      weight: medium
    - reason_code: hard_cap_acceptance
      detail: First apron status in 2025-26 ($195.9M); ownership historically tax-averse; structural constraint on roster additions.
      weight: high
  trigger_events:
    - 2026 lottery result left Sacramento at No. 7, keeping the retool path active but below the top-four prospect tier.
    - Unexpectedly strong 2026-27 season could pivot toward 'contend_soon' if core players elevate.
    - Trade of Sabonis or LaVine would signal shift to 'rebuild'.
  last_reviewed: 2026-05-02
